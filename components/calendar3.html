<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f3f4f6;
            color: #111827;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 15px;
            min-height: 100vh;
        }

        /* ── Nav ── */
        nav {
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            height: 56px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px;
            position: sticky; top: 0; z-index: 5;
        }
        .nav-logo { font-size: 18px; font-weight: 700; color: #111827; }
        .nav-logo span { color: #6366f1; }
        .nav-links { display: flex; gap: 24px; }
        .nav-links a { font-size: 15px; color: #6b7280; text-decoration: none; }
        .nav-links a:hover { color: #111827; }

        /* ── Layout ── */
        .container {
            max-width: 520px; margin: 48px auto;
            padding: 0 16px 64px;
        }
        .page-title {
            font-size: 26px; font-weight: 700; margin-bottom: 6px;
        }
        .page-subtitle {
            font-size: 15px; color: #6b7280; margin-bottom: 32px;
        }

        /* ── Form card ── */
        .form-card {
            background: #fff; border-radius: 14px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            padding: 28px 24px;
        }
        .form-row {
            display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
            margin-bottom: 20px;
        }
        .form-group { margin-bottom: 20px; position: relative; }
        .form-group:last-child { margin-bottom: 0; }
        label {
            display: block; font-size: 15px; font-weight: 500;
            color: #111111; margin-bottom: 6px;
        }
        .form-input {
            width: 100%; padding: 10px 14px;
            border: 1px solid #d1d5db; border-radius: 8px;
            font-size: 15px; font-family: system-ui;
            color: #111827; background: #fff;
            outline: none; transition: border-color 0.15s, box-shadow 0.15s;
        }
        .form-input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
        }
        .dob-input {
            width: 100%; padding: 10px 14px;
            border: 1px solid #d1d5db; border-radius: 8px;
            font-size: 15px; color: #9ca3af; background: #fff;
            cursor: pointer; user-select: none;
            transition: border-color 0.15s, box-shadow 0.15s;
            display: flex; align-items: center; justify-content: space-between;
        }
        .dob-input.filled { color: #111827; }
        .dob-input:hover  { border-color: #a5b4fc; }
        .dob-input.open   {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
        }
        .dob-icon { font-size: 17px; color: #9ca3af; }

        /* ── Solar popup ── */
        .solar-popup {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            width: 520px;
            left: 50%;
            transform: translateX(-50%);
            background: #0a0a1a;
            border-radius: 14px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.45);
            border: 1px solid #1e1e3a;
            z-index: 100;
            display: none;
            overflow: hidden;
        }
        .solar-popup.visible { display: block; }

        #solarCanvas { display: block; cursor: crosshair; }

        .popup-year {
            display: flex; align-items: center; justify-content: center; gap: 20px;
            padding: 10px 20px;
            border-top: 1px solid #1e1e3a;
            border-bottom: 1px solid #1e1e3a;
        }
        .year-btn {
            background: #1e1e3a; border: none; color: #a5b4fc;
            width: 30px; height: 30px; border-radius: 50%;
            font-size: 15px; cursor: pointer; transition: background 0.1s;
            display: flex; align-items: center; justify-content: center;
        }
        .year-btn:hover { background: #2e2e5a; }
        #yearDisplay {
            font-size: 20px; font-weight: 700; color: #fff;
            width: 70px; text-align: center;
        }
        .popup-footer {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px;
        }
        #datePreview {
            font-size: 15px; color: #a5b4fc; font-weight: 500;
        }
        .confirm-btn {
            background: #6366f1; color: #fff; border: none;
            padding: 8px 18px; border-radius: 20px;
            font-size: 15px; font-weight: 600; font-family: system-ui;
            cursor: pointer; transition: background 0.1s;
        }
        .confirm-btn:hover { background: #4f46e5; }

        /* ── Submit btn ── */
        .submit-btn {
            width: 100%; background: #6366f1; color: #fff; border: none;
            padding: 13px; border-radius: 8px; font-size: 17px;
            font-weight: 600; font-family: system-ui; cursor: pointer;
            margin-top: 28px; transition: background 0.1s;
        }
        .submit-btn:hover { background: #4f46e5; }

        /* ── Legal ── */
        .legal { font-size: 13px; color: #9ca3af; text-align: center; margin-top: 16px; line-height: 1.6; }

        /* ── Sidebar teaser ── */
        .already { text-align: center; margin-top: 20px; font-size: 15px; color: #6b7280; }
        .already a { color: #6366f1; text-decoration: none; font-weight: 500; }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo">orbi<span>t</span></div>
    <div class="nav-links">
        <a href="#">Features</a>
        <a href="#">Pricing</a>
        <a href="#">About</a>
    </div>
</nav>

<div class="container">

    <div class="form-card">

        <!-- THE SPECIAL ONE -->
        <div class="form-group" id="dobWrapper">
            <label>Date of birth <span style="color:#9ca3af;font-weight:400">(required)</span></label>
            <div class="dob-input" id="dobInput">
                <span id="dobText">DD / MM / YYYY</span>
                <span class="dob-icon">🌍</span>
            </div>

            <!-- Solar system popup -->
            <div class="solar-popup" id="solarPopup">
                <canvas id="solarCanvas" width="518" height="430"></canvas>
                <div class="popup-year">
                    <button class="year-btn" id="yearDown">◄</button>
                    <div id="yearDisplay">1990</div>
                    <button class="year-btn" id="yearUp">►</button>
                </div>
                <div class="popup-footer">
                    <div id="datePreview">January 1, 1990</div>
                    <button class="confirm-btn" id="confirmBtn">Confirm</button>
                </div>
            </div>
        </div>

        </div>
</div>

<script>
// ── Elements ─────────────────────────────────────────
const dobInput   = document.getElementById('dobInput');
const dobText    = document.getElementById('dobText');
const solarPopup = document.getElementById('solarPopup');
const canvas     = document.getElementById('solarCanvas');
const ctx        = canvas.getContext('2d');
const yearDown   = document.getElementById('yearDown');
const yearUp     = document.getElementById('yearUp');
const yearDisp   = document.getElementById('yearDisplay');
const datePreview= document.getElementById('datePreview');
const confirmBtn = document.getElementById('confirmBtn');

const CW = 518, CH = 430;

// ── Solar system geometry ─────────────────────────────
const SX = CW / 2, SY = CH / 2 + 10; // Sun center (slightly below middle to give top room)
const R_MERC  = 58;
const R_VEN   = 92;
const R_EARTH = 150;
const R_MARS  = 212;

// ── Date state ───────────────────────────────────────
let earthAngle = 0;   // 0 = top = Jan 1, clockwise
let year = 1990;
let dragging = false;
let hoverAngle = null;
let prevAngle = 0;

const MONTH_NAMES  = ['January','February','March','April','May','June',
                      'July','August','September','October','November','December'];
const MONTH_SHORT  = ['Jan','Feb','Mar','Apr','May','Jun',
                      'Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTH_DAYS   = [31,28,31,30,31,30,31,31,30,31,30,31];

function isLeap(y) { return (y%4===0 && y%100!==0) || y%400===0; }
function daysInYear(y) { return isLeap(y) ? 366 : 365; }
function monthDays(y) {
    const d = [...MONTH_DAYS];
    if (isLeap(y)) d[1] = 29;
    return d;
}

function angleToDate(angle, y) {
    // angle 0 = top = Jan 1, clockwise
    const frac = ((angle % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI) / (2*Math.PI);
    const doy  = Math.floor(frac * daysInYear(y)); // 0-indexed
    const md   = monthDays(y);
    let month = 0, rem = doy;
    while (month < 11 && rem >= md[month]) { rem -= md[month]; month++; }
    return { month, day: rem + 1 };
}

function dateToAngle(month, day, y) {
    const md  = monthDays(y);
    let doy   = 0;
    for (let i = 0; i < month; i++) doy += md[i];
    doy += day - 1;
    return (doy / daysInYear(y)) * 2 * Math.PI;
}

function monthMidAngle(m, y) {
    const md  = monthDays(y);
    let doy   = 0;
    for (let i = 0; i < m; i++) doy += md[i];
    doy += md[m] / 2;
    return (doy / daysInYear(y)) * 2 * Math.PI;
}

function formatDate(month, day, y) {
    return `${MONTH_NAMES[month]} ${day}, ${y}`;
}

// ── Planet positions ──────────────────────────────────
function planetPos(r, angle) {
    return { x: SX + r * Math.sin(angle), y: SY - r * Math.cos(angle) };
}

// ── Stars ─────────────────────────────────────────────
const STARS = Array.from({ length: 120 }, () => ({
    x: Math.random() * CW, y: Math.random() * CH,
    r: 0.4 + Math.random() * 1.0,
    tw: Math.random() * Math.PI * 2,
}));

// ── Draw ─────────────────────────────────────────────
function render() {
    const now = Date.now();
    ctx.clearRect(0, 0, CW, CH);

    // Background
    ctx.fillStyle = '#05050f';
    ctx.fillRect(0, 0, CW, CH);

    // Stars
    STARS.forEach(s => {
        const alpha = 0.4 + 0.6 * Math.abs(Math.sin(now / 1400 + s.tw));
        ctx.fillStyle = `rgba(220,230,255,${alpha})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
    });

    // Orbit rings
    drawOrbit(R_MERC, 'rgba(255,255,255,0.08)');
    drawOrbit(R_VEN,  'rgba(255,255,255,0.08)');
    drawOrbit(R_MARS, 'rgba(255,255,255,0.08)');

    // Earth orbit (slightly brighter, dashed months)
    ctx.save();
    ctx.strokeStyle = 'rgba(99,102,241,0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 4]);
    ctx.beginPath();
    ctx.arc(SX, SY, R_EARTH, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // Month tick marks + labels
    for (let m = 0; m < 12; m++) {
        const startAngle = dateToAngle(m, 1, year);
        const ep = planetPos(R_EARTH, startAngle);
        const tp = planetPos(R_EARTH + 18, startAngle);
        const lp = planetPos(R_EARTH + 36, startAngle);
        // tick
        ctx.strokeStyle = 'rgba(165,180,252,0.5)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(ep.x, ep.y);
        ctx.lineTo(tp.x, tp.y);
        ctx.stroke();
        // label
        ctx.fillStyle = 'rgba(165,180,252,0.75)';
        ctx.font = 'bold 14px system-ui';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(MONTH_SHORT[m], lp.x, lp.y);
    }

    // Hover ghost position
    if (hoverAngle !== null && !dragging) {
        const hp = planetPos(R_EARTH, hoverAngle);
        ctx.beginPath();
        ctx.arc(hp.x, hp.y, 10, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(99,102,241,0.45)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
    }

    // Mercury (animated)
    const mercAngle = (now / 2400) % (2 * Math.PI);
    const merc = planetPos(R_MERC, mercAngle);
    ctx.fillStyle = '#9ca3af';
    ctx.beginPath();
    ctx.arc(merc.x, merc.y, 3.5, 0, Math.PI * 2);
    ctx.fill();

    // Venus (animated)
    const venAngle = (now / 6200) % (2 * Math.PI);
    const ven = planetPos(R_VEN, venAngle);
    const venGrd = ctx.createRadialGradient(ven.x, ven.y, 0, ven.x, ven.y, 5);
    venGrd.addColorStop(0, '#fde68a');
    venGrd.addColorStop(1, '#d97706');
    ctx.fillStyle = venGrd;
    ctx.beginPath();
    ctx.arc(ven.x, ven.y, 5, 0, Math.PI * 2);
    ctx.fill();

    // Sun glow
    const sunGlow = ctx.createRadialGradient(SX, SY, 14, SX, SY, 70);
    sunGlow.addColorStop(0, 'rgba(255,200,50,0.4)');
    sunGlow.addColorStop(0.4, 'rgba(255,140,20,0.15)');
    sunGlow.addColorStop(1, 'rgba(255,80,0,0)');
    ctx.fillStyle = sunGlow;
    ctx.beginPath();
    ctx.arc(SX, SY, 70, 0, Math.PI * 2);
    ctx.fill();

    // Sun
    const sunCore = ctx.createRadialGradient(SX - 4, SY - 4, 0, SX, SY, 18);
    sunCore.addColorStop(0, '#fff7ae');
    sunCore.addColorStop(0.5, '#fbbf24');
    sunCore.addColorStop(1, '#f97316');
    ctx.fillStyle = sunCore;
    ctx.beginPath();
    ctx.arc(SX, SY, 18, 0, Math.PI * 2);
    ctx.fill();

    // Sun corona pulse
    const pulse = 0.15 + 0.05 * Math.sin(now / 600);
    ctx.strokeStyle = `rgba(251,191,36,${pulse})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(SX, SY, 22, 0, Math.PI * 2);
    ctx.stroke();

    // Sun-to-Earth dotted line
    const ep = planetPos(R_EARTH, earthAngle);
    ctx.save();
    ctx.setLineDash([3, 5]);
    ctx.strokeStyle = 'rgba(99,102,241,0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(SX, SY);
    ctx.lineTo(ep.x, ep.y);
    ctx.stroke();
    ctx.restore();

    // Mars (animated)
    const marsAngle = (now / 22000) % (2 * Math.PI);
    const mars = planetPos(R_MARS, marsAngle);
    const marsGrd = ctx.createRadialGradient(mars.x, mars.y, 0, mars.x, mars.y, 7);
    marsGrd.addColorStop(0, '#fca5a5');
    marsGrd.addColorStop(1, '#dc2626');
    ctx.fillStyle = marsGrd;
    ctx.beginPath();
    ctx.arc(mars.x, mars.y, 7, 0, Math.PI * 2);
    ctx.fill();

    // Moon (orbiting Earth)
    const moonAngle = (now / 2900) % (2 * Math.PI);
    const moonX = ep.x + 18 * Math.sin(moonAngle);
    const moonY = ep.y - 18 * Math.cos(moonAngle);
    ctx.fillStyle = '#d1d5db';
    ctx.beginPath();
    ctx.arc(moonX, moonY, 4, 0, Math.PI * 2);
    ctx.fill();

    // Earth
    const earthGrd = ctx.createRadialGradient(ep.x - 3, ep.y - 3, 0, ep.x, ep.y, 11);
    earthGrd.addColorStop(0, '#bfdbfe');
    earthGrd.addColorStop(0.4, '#3b82f6');
    earthGrd.addColorStop(0.75, '#16a34a');
    earthGrd.addColorStop(1, '#15803d');
    ctx.fillStyle = earthGrd;
    ctx.beginPath();
    ctx.arc(ep.x, ep.y, 11, 0, Math.PI * 2);
    ctx.fill();
    // Atmosphere glow
    ctx.strokeStyle = 'rgba(147,197,253,0.5)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(ep.x, ep.y, 12.5, 0, Math.PI * 2);
    ctx.stroke();

    // Current month highlight at top of canvas
    const { month, day } = angleToDate(earthAngle, year);
    ctx.fillStyle = 'rgba(165,180,252,0.9)';
    ctx.font = 'bold 20px system-ui';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(MONTH_NAMES[month].toUpperCase(), CW / 2, 12);

    requestAnimationFrame(render);
}

function drawOrbit(r, color) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(SX, SY, r, 0, Math.PI * 2);
    ctx.stroke();
}

// ── Interaction ───────────────────────────────────────
function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const src  = e.touches ? e.touches[0] : e;
    return {
        x: (src.clientX - rect.left) * (CW / rect.width),
        y: (src.clientY - rect.top)  * (CH / rect.height),
    };
}

function posToAngle(x, y) {
    const dx = x - SX, dy = y - SY;
    let a = Math.atan2(dx, -dy);
    if (a < 0) a += 2 * Math.PI;
    return a;
}

function applyAngle(newAngle) {
    const TWO_PI = 2 * Math.PI;
    const THRESHOLD = TWO_PI * 0.8; // must have moved > 80% of a circle to count as a wrap
    const diff = newAngle - prevAngle;
    // Clockwise wrap: prev near 2π, new near 0 → year++
    if (prevAngle > TWO_PI * 0.75 && newAngle < TWO_PI * 0.25) {
        if (year < 2025) { year++; yearDisp.textContent = year; }
    }
    // Counter-clockwise wrap: prev near 0, new near 2π → year--
    if (prevAngle < TWO_PI * 0.25 && newAngle > TWO_PI * 0.75) {
        if (year > 1920) { year--; yearDisp.textContent = year; }
    }
    prevAngle = newAngle;
    earthAngle = newAngle;
}

function isNearEarth(x, y) {
    const ep = planetPos(R_EARTH, earthAngle);
    return Math.hypot(x - ep.x, y - ep.y) < 18;
}

function isNearOrbit(x, y) {
    const dist = Math.hypot(x - SX, y - SY);
    return Math.abs(dist - R_EARTH) < 22;
}

canvas.addEventListener('mousedown', e => {
    const pos = getPos(e);
    if (isNearEarth(pos.x, pos.y) || isNearOrbit(pos.x, pos.y)) {
        dragging = true;
        prevAngle = earthAngle;
        applyAngle(posToAngle(pos.x, pos.y));
        updatePreview();
    }
});

canvas.addEventListener('mousemove', e => {
    const pos = getPos(e);
    if (dragging) {
        applyAngle(posToAngle(pos.x, pos.y));
        updatePreview();
        hoverAngle = null;
        canvas.style.cursor = 'grabbing';
    } else {
        if (isNearEarth(pos.x, pos.y)) {
            canvas.style.cursor = 'grab';
            hoverAngle = null;
        } else if (isNearOrbit(pos.x, pos.y)) {
            canvas.style.cursor = 'crosshair';
            hoverAngle = posToAngle(pos.x, pos.y);
        } else {
            canvas.style.cursor = 'default';
            hoverAngle = null;
        }
    }
});

canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const pos = getPos(e);
    dragging = true;
    prevAngle = earthAngle;
    applyAngle(posToAngle(pos.x, pos.y));
    updatePreview();
}, { passive: false });

canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!dragging) return;
    const pos = getPos(e);
    applyAngle(posToAngle(pos.x, pos.y));
    updatePreview();
}, { passive: false });

document.addEventListener('mouseup',  () => { dragging = false; });
document.addEventListener('touchend', () => { dragging = false; });

// Prevent popup closing when clicking inside
solarPopup.addEventListener('click', e => e.stopPropagation());

// ── Popup open/close ──────────────────────────────────
dobInput.addEventListener('click', e => {
    e.stopPropagation();
    const isOpen = solarPopup.classList.contains('visible');
    solarPopup.classList.toggle('visible', !isOpen);
    dobInput.classList.toggle('open', !isOpen);
});

document.addEventListener('click', () => {
    solarPopup.classList.remove('visible');
    dobInput.classList.remove('open');
});

// ── Year controls ─────────────────────────────────────
yearDown.addEventListener('click', e => {
    e.stopPropagation();
    if (year > 1920) { year--; yearDisp.textContent = year; updatePreview(); }
});
yearUp.addEventListener('click', e => {
    e.stopPropagation();
    if (year < 2015) { year++; yearDisp.textContent = year; updatePreview(); }
});

// Mouse wheel on year display
yearDisp.addEventListener('wheel', e => {
    e.preventDefault();
    e.stopPropagation();
    if (e.deltaY < 0 && year < 2015) { year++; yearDisp.textContent = year; updatePreview(); }
    if (e.deltaY > 0 && year > 1920) { year--; yearDisp.textContent = year; updatePreview(); }
}, { passive: false });

// ── Confirm ───────────────────────────────────────────
confirmBtn.addEventListener('click', e => {
    e.stopPropagation();
    const { month, day } = angleToDate(earthAngle, year);
    const d = String(day).padStart(2,'0');
    const m = String(month + 1).padStart(2,'0');
    dobText.textContent = `${d} / ${m} / ${year}`;
    dobInput.classList.add('filled');
    solarPopup.classList.remove('visible');
    dobInput.classList.remove('open');
});

// ── Preview update ────────────────────────────────────
function updatePreview() {
    const { month, day } = angleToDate(earthAngle, year);
    datePreview.textContent = formatDate(month, day, year);
}

// ── Init ─────────────────────────────────────────────
updatePreview();
render();
</script>

</body>
</html>
